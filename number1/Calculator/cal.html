<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="cal.css">
    <style>
        h1{
            color: black;
        }
    </style>
</head>
<body>
    <h1>Calculator</h1>
    <div class="calculator">
        <input type="text" class="display" readonly>
        <div class="buttons">
            <button class="inp"> AC</button>
            <button class="inp">Del</button>
            <button class="inp">^</button>
            <button class="inp">/</button>

            <button class="inp">7</button>
            <button class="inp">8</button>
            <button class="inp">9</button>
            <button class="inp">*</button>
            
            <button class="inp">4</button>
            <button class="inp">5</button>
            <button class="inp">6</button>
            <button class="inp">-</button>

            <button class="inp">1</button>
            <button class="inp">2</button>
            <button class="inp">3</button>
            <button class="inp">+</button>

            <button class="inp">()</button>
            <button class="inp">0</button>
            <button class="inp">.</button>
            <button class="inp">=</button>
        </div>
    </div>
    <script src="cal.js"></script>
</body>
</html>
