<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemons</title>
    <link rel="stylesheet" href="poke.css">
</head>
<body>
    <div class="outer-div">
        <div class="search-cont">
            <label>Search the pokemon</label>
            <input type="search" placeholder="Search" class="inp-search">
            <button  class="but-search">Search</button>
            <div class="meta-data">
                <span class="pok-id">ID:</span>
                <span class="pok-height">Height:</span>
                <span class="pok-weight">Weight:</span>
            </div>
        </div>
        <div class="imag-cont">
            <img src="" class="pok-image">
        </div>
    </div>
    <script src="poke.js" ></script>
</body>
</html>
